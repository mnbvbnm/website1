<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Film Link Manager - Stream Zone</title>

  <style>
    :root {
      --bg: #080808;
      --panel: #121212;
      --panel-2: #191919;
      --text: #f8f3e8;
      --muted: #a99c86;
      --gold: #d6a84f;
      --gold-light: #f0c979;
      --green: #60d99d;
      --danger: #ff7070;
      --border: rgba(214, 168, 79, .23);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(
          circle at top left,
          rgba(214, 168, 79, .12),
          transparent 30%
        ),
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 70px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 8, .9);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-mark {
      width: 43px;
      height: 43px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: #150e04;
      font-weight: 1000;
      background: linear-gradient(
        145deg,
        var(--gold-light),
        #94641e
      );
    }

    .brand h1 {
      margin: 0;
      font-size: 1.05rem;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .75rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-link,
    .logout {
      height: 40px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      background: var(--panel);
      font-weight: 800;
      text-decoration: none;
    }

    .page {
      width: min(1300px, calc(100% - 30px));
      margin: 25px auto 50px;
    }

    .intro h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .intro p {
      margin: 7px 0 22px;
      color: var(--muted);
    }

    .toolbar {
      padding: 15px;
      margin-bottom: 17px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: var(--panel);
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 800;
    }

    input,
    select{
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
      color: var(--text);
      background: var(--panel-2);
    }

    input:focus {
      border-color: var(--gold);
    }

    .results-info {
      margin: 0 2px 12px;
      color: var(--muted);
      font-size: .84rem;
    }

    .film-list {
      display: grid;
      gap: 12px;
    }

    .film-card {
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr 130px auto;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: var(--panel);
    }

    .film-title {
      min-width: 0;
    }

    .film-title strong {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 1rem;
    }

    .film-title span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    .missing-link strong {
      color: var(--danger);
    }

    .save-btn {
      height: 44px;
      padding: 0 16px;
      border: 0;
      border-radius: 11px;
      color: #150e04;
      background: linear-gradient(
        180deg,
        var(--gold-light),
        #a67525
      );
      font-weight: 900;
    }

    .save-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .empty {
      padding: 35px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 17px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 200;
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      color: var(--text);
      background: #181818;
      transform: translateY(20px);
      transition: .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      color: #ffd5d5;
      border-color: rgba(255,112,112,.5);
    }

    @media (max-width: 800px) {
      .topbar {
        padding-inline: 12px;
      }

      .film-card {
        grid-template-columns: 1fr;
      }

      .save-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">SZ</div>

      <div>
        <h1>Film Link Manager</h1>
        <p>Edit film watch links only</p>
      </div>
    </div>

    <div class="top-actions">
      <a
  class="nav-link"
  href="{{ url_for('admin_backups_page') }}"
>
  Backups
</a>
      <a
        class="nav-link"
        href="{{ url_for('admin_episodes_page') }}"
      >
        Episodes
      </a>

      <form
        action="{{ url_for('admin_logout') }}"
        method="post"
      >
        <input
          type="hidden"
          name="csrf_token"
          value="{{ csrf_token }}"
        >

        <button class="logout" type="submit">
          Logout
        </button>
      </form>
    </div>
  </header>

  <main class="page">
    <section class="intro">
      <h2>Film Links</h2>

      <p>
        This page only edits the film watch link stored in data.json.
        It does not edit film title, description, rating, genres, or cast.
      </p>
    </section>

    <section class="toolbar">
      <label for="search-input">Search film</label>

      <input
        id="search-input"
        type="search"
        placeholder="Search by film title or code"
      >
    </section>

    <p
      id="results-info"
      class="results-info"
    >
      Loading films...
    </p>

    <section
      id="film-list"
      class="film-list"
    ></section>
  </main>

  <div
    id="toast"
    class="toast"
  ></div>

  <script>
    const csrfToken = {{ csrf_token | tojson }};

    const state = {
      films: [],
      filtered: []
    };

    const searchInput =
      document.getElementById("search-input");

    const filmList =
      document.getElementById("film-list");

    const resultsInfo =
      document.getElementById("results-info");

    const toast =
      document.getElementById("toast");

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.classList.toggle("error", isError);
      toast.classList.add("show");

      clearTimeout(showToast.timer);

      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2400);
    }

    function isMissingLink(film) {
  const provider = String(
    film.video_provider || "drive"
  ).trim().toLowerCase();

  const hasLink = Boolean(
    String(film.link || "").trim()
  );

  const hasEmbed = Boolean(
    String(film.video_embed_url || "").trim()
  );

  if (provider === "drive") {
    return !hasLink;
  }

  if (provider === "bunny") {
    return !hasEmbed && !hasLink;
  }

  if (provider === "cloudflare") {
    return !hasEmbed;
  }

  if (provider === "direct") {
    return !hasEmbed && !hasLink;
  }

  return !hasLink;
}

    function applyFilter() {
      const query = searchInput.value
        .trim()
        .toLowerCase();

      state.filtered = state.films.filter(film => {
        const text = `
          ${film.title}
          ${film.code}
          ${film.year}
          ${film.rating}
        `.toLowerCase();

        return text.includes(query);
      });

      renderFilms();
    }

    function renderFilms() {
  resultsInfo.textContent =
    `Showing ${state.filtered.length} / ${state.films.length} films`;

  if (!state.filtered.length) {
    filmList.innerHTML = `
      <div class="empty">
        No films found.
      </div>
    `;

    return;
  }

  filmList.innerHTML = "";

  state.filtered.forEach(film => {
    const card = document.createElement("article");

    card.className = isMissingLink(film)
      ? "film-card missing-link"
      : "film-card";

    card.innerHTML = `
      <div class="film-title">
        <strong>${escapeHtml(film.title)}</strong>

        <span>
          ${escapeHtml(film.code)}
          ${film.year ? " • " + escapeHtml(film.year) : ""}
          ${film.rating ? " • " + escapeHtml(film.rating) : ""}
          ${film.duration ? " • " + escapeHtml(film.duration) : ""}
          ${film.age_rating ? " • " + escapeHtml(film.age_rating) : ""}
        </span>

        <span>
          ${escapeHtml(film.video_provider || "drive")}
          • ${escapeHtml(film.status || "published")}
        </span>
      </div>

      <div>
        <label>
          Drive / fallback link
        </label>

        <input
          class="film-link-input"
          type="url"
          value="${escapeHtml(film.link || "")}"
          placeholder="https://drive.google.com/open?id=..."
        >
      </div>

      <div>
        <label>
          Video embed URL
        </label>

        <input
          class="film-embed-input"
          type="url"
          value="${escapeHtml(film.video_embed_url || "")}"
          placeholder="Bunny iframe src / direct MP4"
        >
      </div>

      <div>
        <label>
          Provider
        </label>

        <select class="film-provider-select">
          <option value="drive">Drive</option>
          <option value="bunny">Bunny</option>
          <option value="cloudflare">Cloudflare</option>
          <option value="direct">Direct</option>
        </select>

        <label style="margin-top:8px;">
          Status
        </label>

        <select class="film-status-select">
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="needs_review">Needs review</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <button
        class="save-btn"
        type="button"
      >
        Save
      </button>
    `;

    const linkInput =
      card.querySelector(".film-link-input");

    const embedInput =
      card.querySelector(".film-embed-input");

    const providerSelect =
      card.querySelector(".film-provider-select");

    const statusSelect =
      card.querySelector(".film-status-select");

    const button =
      card.querySelector(".save-btn");

    providerSelect.value =
      film.video_provider || "drive";

    statusSelect.value =
      film.status || "published";

    [
      linkInput,
      embedInput
    ].forEach(input => {
      input.addEventListener("paste", () => {
        setTimeout(() => {
          showToast("Pasted.");
        }, 20);
      });

      input.addEventListener("keydown", event => {
        if (
          event.key === "Enter" &&
          event.ctrlKey
        ) {
          event.preventDefault();

          saveFilmLink(
            film,
            linkInput,
            embedInput,
            providerSelect,
            statusSelect,
            button
          );
        }
      });
    });

    button.addEventListener("click", () => {
      saveFilmLink(
        film,
        linkInput,
        embedInput,
        providerSelect,
        statusSelect,
        button
      );
    });

    filmList.appendChild(card);
  });
}

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function saveFilmLink(
  film,
  linkInput,
  embedInput,
  providerSelect,
  statusSelect,
  button
) {
  const link =
    linkInput.value.trim();

  const videoEmbedUrl =
    embedInput.value.trim();

  const videoProvider =
    providerSelect.value.trim();

  const status =
    statusSelect.value.trim();

  button.disabled = true;
  button.textContent = "Saving...";

  try {
    const response = await fetch(
      `/api/admin/films/${encodeURIComponent(film.code)}/link`,
      {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-Token": csrfToken
        },
        body: JSON.stringify({
          link,
          video_provider: videoProvider,
          video_embed_url: videoEmbedUrl,
          status
        })
      }
    );

    const result = await response.json();

    if (!response.ok) {
      throw new Error(
        result.error || "Could not save film link."
      );
    }

    film.link = result.link || link;
    film.video_provider =
      result.video_provider || videoProvider;
    film.video_embed_url =
      result.video_embed_url || videoEmbedUrl;
    film.status =
      result.status || status;

    showToast("Film video source saved.");

    applyFilter();

  } catch (error) {
    showToast(error.message, true);

  } finally {
    button.disabled = false;
    button.textContent = "Save";
  }
}

    async function loadFilms() {
      try {
        const response = await fetch(
          "/api/admin/films-links",
          {
            cache: "no-store"
          }
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(
            result.error || "Could not load films."
          );
        }

        state.films = result.films || [];
        state.filtered = [...state.films];

        renderFilms();

      } catch (error) {
        resultsInfo.textContent = "Failed to load films.";

        filmList.innerHTML = `
          <div class="empty">
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    searchInput.addEventListener(
      "input",
      applyFilter
    );

    loadFilms();
  </script>
</body>
</html>
